services:
  - type: web
    name: stufi-api
    runtime: node
    plan: free
    buildCommand: "npm install && npm run build && npm run db:push && npm run db:seed"
    startCommand: "npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: stufi-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false

databases:
  - name: stufi-db
    plan: free
    databaseName: stufi
    user: stufi_user
