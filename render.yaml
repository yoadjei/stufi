services:
  - type: web
    name: stufi-api
    runtime: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: stufi-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: stufi-db
    plan: free
    databaseName: stufi
    user: stufi_user
